name: Banking update

# Esecuzione automatica martedì e venerdì alle 08:00 ora italiana (06:00 UTC).
# Esecuzione manuale: Actions → "Banking update" → Run workflow.
on:
  schedule:
    - cron: '0 6 * * 2,5'
  workflow_dispatch:
    inputs:
      mock:
        description: 'Usa mock data (no chiamata Claude API)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run banking agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ inputs.mock }}" = "true" ]; then
            python -m agent.run banking --mock
          else
            python -m agent.run banking
          fi
