name: Reminder giovedì · check settimanale News Banche

# Apre un'issue di reminder ogni giovedì mattina (Italia).
# Motivo: la pagina News Banche si aggiorna il venerdì mattina; il giovedì è il momento
# per configurare/controllare che il secret ANTHROPIC_API_KEY sia impostato e le fonti siano attive.
# GitHub manda notifica email automaticamente all'apertura dell'issue.

on:
  schedule:
    - cron: '17 6 * * 4'  # giovedì 06:17 UTC = 08:17 Europe/Rome
  workflow_dispatch:

permissions:
  issues: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Apri issue di reminder
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date();
            const week = Math.ceil((today - new Date(today.getFullYear(), 0, 1)) / 604800000);
            const dateIt = today.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });

            const body = `## Checklist News Banche · settimana ${week}

            Ciao Angelo, promemoria del giovedì (${dateIt}) — domattina venerdì alle 08:00 l'agente prova a girare.

            ### Cose da controllare oggi

            - [ ] **Secret** \`ANTHROPIC_API_KEY\` **configurato?**
              Vai su [Settings → Secrets and variables → Actions](../../settings/secrets/actions).
              Se non c'è, cliccalo per aggiungerlo (serve una API key da https://console.anthropic.com — carichi \$5-10 di credito e sei a posto per almeno 6 mesi).

            - [ ] **Prima di dormire, verifica** che nella [tab Actions](../../actions/workflows/banking-update.yml) il workflow "News Banche · aggiornamento settimanale" sia visibile e abilitato.

            ### Domattina venerdì (senza fare niente)

            - [ ] L'agente gira intorno alle 08:00 Italia
            - [ ] Se raccoglie news, apre una PR verso \`main\` con il diff del file \`news-banche.html\`
            - [ ] GitHub ti manda notifica email → apri la PR, controlla il diff, "Merge pull request"
            - [ ] Live su [angelodistani.com/news-banche.html](https://angelodistani.com/news-banche.html) entro 1 minuto

            ### Se non arriva la PR

            Controlla i log su [Actions → News Banche · aggiornamento settimanale](../../actions/workflows/banking-update.yml).
            Cause più comuni:
            - Secret API mancante o scaduto
            - Feed RSS regionale rotto (l'agente logga ma non blocca — la PR arriva lo stesso)
            - Nessuna news pertinente trovata questa settimana → l'agente non apre PR, ma è raro

            ### Deep dive di questa settimana

            La rotazione è deterministica per ISO week: settimana ${week} approfondirà 4 banche fra quelle meno recentemente coperte (vedi \`agent/sources/banking.yaml → deep_dive_rotation\`). Se vuoi forzare altre banche, usa "Run workflow" con l'input \`force_banks: "mps,credem"\`.

            ---

            Chiudi questa issue quando hai fatto il check. Se ne apre un'altra il prossimo giovedì.

            _(Reminder auto-generato dal workflow \`thursday-reminder.yml\`.)_
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Checklist News Banche · settimana ${week} (${dateIt})`,
              body: body.replace(/^            /gm, ''),
              labels: ['reminder', 'news-banche']
            });
