    enabled: true
  - name: "ANSA — Economia"
    url: "https://www.ansa.it/sito/notizie/economia/economia_rss.xml"
    enabled: true
  - name: "MF Milano Finanza — Banche"
    url: "https://www.milanofinanza.it/rss/Default/banche-e-assicurazioni"
    enabled: true
  - name: "Banca d'Italia — Comunicati"
    url: "https://www.bancaditalia.it/media/comunicati/feed-rss.xml"
    enabled: true
  - name: "BeBeez"
    url: "https://bebeez.it/feed/"
    enabled: true
  - name: "ABI — Comunicati"
    url: "https://www.abi.it/rss/comunicati"
    enabled: true
  - name: "FiscoOggi"
    url: "https://www.fiscooggi.it/rss-feed"
    enabled: true

  # Regionali — Piemonte / Lombardia (Fase 1)
  - name: "Il Cittadino di Monza e Brianza"
    url: "https://www.ilcittadinomb.it/rss/economia"
    enabled: true
  - name: "PrimaMonza"
    url: "https://primamonza.it/economia/feed/"
    enabled: true
  - name: "AtNews — Asti"
    url: "https://www.atnews.it/feed/"
    enabled: true
  - name: "Quotidiano Piemontese — Economia"
    url: "https://www.quotidianopiemontese.it/categoria/economia/feed/"
    enabled: true
  - name: "BresciaToday — Economia"
    url: "https://www.bresciatoday.it/rss/economia/"
